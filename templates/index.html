<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 65%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f8f9fa;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }

        .actions a {
            margin-left: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        .complete {
            color: green;
        }

        .delete {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>My To-Do List 📝</h2>

    <form method="POST">
        <input type="text" name="task" placeholder="Enter task" required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>
                <span class="{{ 'done' if task[2] == 1 else '' }}">
                    {{ task[1] }}
                </span>
                <div class="actions">
                    <a href="/complete/{{ task[0] }}" class="complete">✔</a>
                    <a href="/delete/{{ task[0] }}" style="color:red;">❌</a>
                </div>
            </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
